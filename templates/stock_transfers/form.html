{% extends "base.html" %}
{% block title %}Add Stock Transfer{% endblock %}
{% block page_title %}Add Stock Transfer{% endblock %}
{% block breadcrumb_active %}Stock Transfers{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-exchange-alt"></i> Create Stock Transfer</h3>
    </div>
    <form method="POST">
        <div class="card-body">
            <div class="row mb-4">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>From Warehouse *</label>
                        <select name="from_warehouse_id" class="form-control" required>
                            <option value="">Select Source Warehouse</option>
                            {% for warehouse in warehouses %}
                            <option value="{{ warehouse.id }}">{{ warehouse.name }} ({{ warehouse.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>To Warehouse *</label>
                        <select name="to_warehouse_id" class="form-control" required>
                            <option value="">Select Destination Warehouse</option>
                            {% for warehouse in warehouses %}
                            <option value="{{ warehouse.id }}">{{ warehouse.name }} ({{ warehouse.code }})</option>
                            {% endfor %}
                        </select>
                    </div>
                </div>
            </div>

            <table class="table table-bordered" id="transferItemsTable">
                <thead>
                    <tr>
                        <th>Material</th>
                        <th>Quantity</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>
                            <select name="material_id[]" class="form-control" required>
                                <option value="">Select Material</option>
                                {% for material in materials %}
                                <option value="{{ material.id }}">{{ material.name }}</option>
                                {% endfor %}
                            </select>
                        </td>
                        <td><input type="number" step="0.01" name="quantity[]" class="form-control" required></td>
                        <td>
                            <button type="button" class="btn btn-danger btn-sm" onclick="this.closest('tr').remove()">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                </tbody>
            </table>
            <button type="button" class="btn btn-secondary btn-sm" onclick="addTransferItem()">
                <i class="fas fa-plus"></i> Add Item
            </button>

            <div class="form-group mt-4">
                <label>Notes</label>
                <textarea name="notes" class="form-control" rows="3"></textarea>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Create Transfer
            </button>
            <a href="{{ url_for('main.stock_transfers') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>

<script>
function addTransferItem() {
    const tbody = document.querySelector('#transferItemsTable tbody');
    const row = tbody.rows[0].cloneNode(true);
    row.querySelectorAll('input').forEach(input => input.value = '');
    tbody.appendChild(row);
}
</script>
{% endblock %}
