{% extends "base.html" %}

{% block title %}Settings{% endblock %}
{% block page_title %}Company Settings{% endblock %}
{% block breadcrumb_active %}Settings{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title">Company Details</h3>
    </div>
    <form method="POST">
        <div class="card-body">
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Company Name</label>
                            <input type="text" name="company_name" class="form-control" value="{{ settings.get('company_name', 'Ampoulex') }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>NTN Number</label>
                            <input type="text" name="company_ntn" class="form-control" value="{{ settings.get('company_ntn', '') }}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>GST/Sales Tax Rate (%)</label>
                            <input type="number" name="company_gst" class="form-control" value="{{ settings.get('company_gst', '17') }}" step="0.1">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>SECP Registration</label>
                            <input type="text" name="company_secp" class="form-control" value="{{ settings.get('company_secp', '') }}">
                        </div>
                    </div>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>DRAP License Number</label>
                            <input type="text" name="company_drap" class="form-control" value="{{ settings.get('company_drap', '') }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>ISO Certification</label>
                            <input type="text" name="company_iso" class="form-control" value="{{ settings.get('company_iso', '') }}">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Company Address</label>
                    <textarea name="company_address" class="form-control" rows="3">{{ settings.get('company_address', '') }}</textarea>
                </div>
                <div class="row">
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Phone</label>
                            <input type="text" name="company_phone" class="form-control" value="{{ settings.get('company_phone', '') }}">
                        </div>
                    </div>
                    <div class="col-md-6">
                        <div class="form-group">
                            <label>Email</label>
                            <input type="email" name="company_email" class="form-control" value="{{ settings.get('company_email', '') }}">
                        </div>
                    </div>
                </div>
                <div class="form-group">
                    <label>Website</label>
                    <input type="url" name="company_website" class="form-control" value="{{ settings.get('company_website', '') }}">
                </div>
                <div class="form-group">
                    <label>Invoice Footer Text</label>
                    <textarea name="invoice_footer" class="form-control" rows="2" placeholder="Terms & conditions, bank details, etc.">{{ settings.get('invoice_footer', '') }}</textarea>
                </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">Save Settings</button>
        </div>
    </form>
</div>
{% endblock %}
