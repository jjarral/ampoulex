{% extends "base.html" %}
{% block title %}Quality Check{% endblock %}
{% block page_title %}Quality Check{% endblock %}
{% block breadcrumb_active %}Batches{% endblock %}

{% block content %}
<div class="card">
    <div class="card-header">
        <h3 class="card-title"><i class="fas fa-clipboard-check"></i> Add Quality Check - {{ batch.batch_number }}</h3>
    </div>
    <form method="POST">
        <div class="card-body">
            <div class="row">
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Check Type *</label>
                        <select name="check_type" class="form-control" required>
                            <option value="">Select Type</option>
                            <option value="Dimension">Dimension Check</option>
                            <option value="Visual">Visual Inspection</option>
                            <option value="Leak Test">Leak Test</option>
                            <option value="Strength">Strength Test</option>
                            <option value="Clarity">Clarity Check</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="form-group">
                        <label>Result *</label>
                        <select name="check_result" class="form-control" required>
                            <option value="">Select Result</option>
                            <option value="pass">Pass</option>
                            <option value="fail">Fail</option>
                            <option value="conditional">Conditional</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-md-4">
                    <div class="form-group">
                        <label>Checked Quantity *</label>
                        <input type="number" name="checked_quantity" class="form-control" required min="1">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label>Passed Quantity *</label>
                        <input type="number" name="passed_quantity" class="form-control" required min="0">
                    </div>
                </div>
                <div class="col-md-4">
                    <div class="form-group">
                        <label>Failed Quantity</label>
                        <input type="number" name="failed_quantity" class="form-control" min="0" value="0">
                    </div>
                </div>
            </div>
            <div class="form-group">
                <label>Failure Reason</label>
                <textarea name="failure_reason" class="form-control" rows="2" placeholder="If failed, specify reason..."></textarea>
            </div>
            <div class="form-group">
                <label>Notes</label>
                <textarea name="notes" class="form-control" rows="2"></textarea>
            </div>
        </div>
        <div class="card-footer">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Quality Check
            </button>
            <a href="{{ url_for('main.view_production_batch', id=batch.id) }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>
    </form>
</div>
{% endblock %}
